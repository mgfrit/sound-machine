<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Machine — WiFi Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<nav>
  <div class="brand-block">
    <span class="brand">⚔ Sound Machine</span>
    <span id="wifi-indicator" class="wifi-nav-status"></span>
  </div>
  <a href="/static/instructions.html">Lore</a>
  <a href="/">Board</a>
  <a href="/wifi" class="active">The Weave</a>
</nav>

<main>
  <h1>🌐 The Weave</h1>
  <p class="page-subtitle">Connect the machine to your realm's network.</p>

  <div class="section-card">
    <span class="section-icon">🔊</span>
    <div class="section-title">Bluetooth Speakers</div>
    <div class="section-subheading">Bound Speakers</div>
    <ul class="device-list" id="knownList"></ul>
    <div class="section-subheading" style="margin-top:16px">Nearby Devices</div>
    <button class="btn-primary" id="btScanBtn" onclick="btScan()">Scan for Speakers</button>
    <ul class="device-list" id="nearbyList"></ul>
    <div id="btStatus" class="wifi-status"></div>
  </div>

  <div class="section-card">
    <span class="section-icon">📡</span>
    <div class="section-title">Network Discovery</div>
    <button class="btn-primary" id="scanBtn" onclick="scan()">Scan for Networks</button>
    <ul class="wifi-network-list" id="networkList"></ul>
  </div>

  <div class="section-card" id="connectForm" style="display:none">
    <span class="section-icon">🔑</span>
    <div class="section-title">Enter Passphrase</div>
    <input class="field-input" type="password" id="password" placeholder="Leave blank for open networks">
    <div class="panel-actions">
      <button class="btn-primary" id="connectBtn" onclick="connect()">Connect &amp; Reboot</button>
    </div>
  </div>

  <div id="status" class="wifi-status"></div>
</main>

<script>
  fetch('/api/wifi/status').then(r => r.json()).then(d => {
    const el = document.getElementById('wifi-indicator');
    if (d.ssid) { el.textContent = '● ' + d.ssid; el.className = 'wifi-nav-status connected'; }
    else         { el.textContent = '● No network'; el.className = 'wifi-nav-status disconnected'; }
  }).catch(() => {});

  // ── Bluetooth ──────────────────────────────────────────────────────────────

  function renderKnown(devices) {
    const list = document.getElementById('knownList');
    list.innerHTML = '';
    if (devices.length === 0) {
      list.innerHTML = '<li class="device-empty">No speakers saved yet.</li>';
      return;
    }
    devices.forEach(d => {
      const li = document.createElement('li');
      li.className = 'device-row';
      li.innerHTML = `
        <div class="device-info">
          <span class="device-name">${d.name}</span>
          <span class="device-addr">${d.address}</span>
        </div>
        <button class="btn-forget" onclick="btForget('${d.address}', this)">Forget</button>`;
      list.appendChild(li);
    });
  }

  fetch('/api/bluetooth/known').then(r => r.json()).then(renderKnown).catch(() => {});

  async function btScan() {
    const btn = document.getElementById('btScanBtn');
    const list = document.getElementById('nearbyList');
    btn.disabled = true;
    btn.textContent = 'Scanning…';
    list.innerHTML = '';
    showBtStatus('Scanning for nearby speakers…', 'info');
    try {
      const resp = await fetch('/api/bluetooth/scan');
      const devices = await resp.json();
      hideBtStatus();
      if (devices.length === 0) {
        list.innerHTML = '<li class="device-empty">No new speakers found — try scanning again.</li>';
      } else {
        devices.forEach(d => {
          const li = document.createElement('li');
          li.className = 'device-row';
          li.innerHTML = `
            <div class="device-info">
              <span class="device-name">${d.name}</span>
              <span class="device-addr">${d.address}</span>
            </div>
            <button class="btn-pair" onclick="btPair('${d.address}', '${d.name.replace(/'/g, "\\'")}', this)">Pair</button>`;
          list.appendChild(li);
        });
      }
    } catch (e) {
      showBtStatus('Scan failed: ' + e.message, 'error');
    }
    btn.disabled = false;
    btn.textContent = 'Scan for Speakers';
  }

  async function btPair(address, name, btn) {
    btn.disabled = true;
    btn.textContent = 'Pairing…';
    try {
      const resp = await fetch('/api/bluetooth/pair', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address, name }),
      });
      const data = await resp.json();
      if (data.ok) {
        showBtStatus(data.connected ? `Connected to ${name}!` : `Saved ${name} — will connect on next boot.`, 'success');
        btn.closest('li').remove();
        const known = await fetch('/api/bluetooth/known').then(r => r.json());
        renderKnown(known);
      } else {
        showBtStatus('Pair failed: ' + (data.error || 'Unknown error'), 'error');
        btn.disabled = false;
        btn.textContent = 'Pair';
      }
    } catch (e) {
      showBtStatus('Error: ' + e.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Pair';
    }
  }

  async function btForget(address, btn) {
    btn.disabled = true;
    try {
      const resp = await fetch(`/api/bluetooth/device/${address}`, { method: 'DELETE' });
      const data = await resp.json();
      if (data.ok) {
        const known = await fetch('/api/bluetooth/known').then(r => r.json());
        renderKnown(known);
      } else {
        showBtStatus('Forget failed: ' + (data.error || 'Unknown error'), 'error');
        btn.disabled = false;
      }
    } catch (e) {
      showBtStatus('Error: ' + e.message, 'error');
      btn.disabled = false;
    }
  }

  function showBtStatus(msg, type) {
    const el = document.getElementById('btStatus');
    el.textContent = msg;
    el.className = 'wifi-status ' + type;
    el.style.display = 'block';
  }
  function hideBtStatus() {
    const el = document.getElementById('btStatus');
    el.style.display = 'none';
  }

  let selectedSSID = null;

  async function scan() {
    const btn = document.getElementById('scanBtn');
    const list = document.getElementById('networkList');
    btn.disabled = true;
    btn.textContent = 'Scanning…';
    list.innerHTML = '';
    document.getElementById('connectForm').style.display = 'none';
    selectedSSID = null;

    try {
      const resp = await fetch('/api/wifi/scan');
      const networks = await resp.json();
      if (networks.length === 0) {
        list.innerHTML = '<li style="cursor:default">No networks found — try scanning again.</li>';
      } else {
        networks.forEach(n => {
          const li = document.createElement('li');
          const lock = (n.security && n.security !== '--') ? '🔒 ' : '';
          li.innerHTML = `<span>${n.ssid}</span><span class="wifi-signal">${lock}${n.signal}%</span>`;
          li.onclick = () => selectNetwork(n.ssid, li);
          list.appendChild(li);
        });
      }
    } catch (e) {
      showStatus('Scan failed: ' + e.message, true);
    }

    btn.disabled = false;
    btn.textContent = 'Scan for Networks';
  }

  function selectNetwork(ssid, el) {
    document.querySelectorAll('#networkList li').forEach(li => li.classList.remove('selected'));
    el.classList.add('selected');
    selectedSSID = ssid;
    document.getElementById('connectForm').style.display = 'block';
    document.getElementById('password').focus();
  }

  async function connect() {
    if (!selectedSSID) return;
    const btn = document.getElementById('connectBtn');
    const password = document.getElementById('password').value;
    btn.disabled = true;
    btn.textContent = 'Connecting…';

    try {
      const resp = await fetch('/api/wifi/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ssid: selectedSSID, password }),
      });
      const data = await resp.json();
      if (data.ok) {
        showStatus('Connected! Rebooting in a few seconds…', false);
      } else {
        showStatus('Failed: ' + (data.error || 'Unknown error'), true);
        btn.disabled = false;
        btn.textContent = 'Connect & Reboot';
      }
    } catch (e) {
      showStatus('Error: ' + e.message, true);
      btn.disabled = false;
      btn.textContent = 'Connect & Reboot';
    }
  }

  function showStatus(msg, isError) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'wifi-status ' + (isError ? 'error' : 'success');
    el.style.display = 'block';
  }
</script>
</body>
</html>
